<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Contact Book{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --border: #2a2a2e;
      --text: #f0ede8;
      --muted: #6b6868;
      --accent: #e8c547;
      --accent-dim: #2a2510;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    nav {
      width: 220px;
      min-height: 100vh;
      border-right: 1px solid var(--border);
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: fixed;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin-bottom: 32px;
      display: block;
      text-decoration: none;
    }

    .nav-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 8px;
    }

    nav a {
      display: block;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active {
      background: var(--surface);
      color: var(--text);
    }

    nav a.active {
      color: var(--accent);
    }

    /* Main */
    main {
      margin-left: 220px;
      flex: 1;
      padding: 48px 56px;
      max-width: 860px;
    }

    .page-header {
      margin-bottom: 40px;
    }

    .page-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Cards */
    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.3s ease both;
      transition: border-color 0.2s;
    }

    .contact-card:hover { border-color: #3a3a40; }

    .contact-info .name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .contact-info .meta {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .contact-id {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--border);
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Forms */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="text"],
    input[type="email"] {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      padding: 11px 24px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0f;
    }

    .btn-danger {
      background: #c0392b;
      color: white;
    }

    .btn:hover { opacity: 0.85; }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 40px 0;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">☰ ContactBook</a>
    <span class="nav-label">Menu</span>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>All Contacts</a>
    <a href="/add" {% if request.path == '/add' %}class="active"{% endif %}>Add Contact</a>
    <a href="/search" {% if request.path == '/search' %}class="active"{% endif %}>Search</a>
    <a href="/delete" {% if request.path == '/delete' %}class="active"{% endif %}>Delete</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

</body>
</html>
